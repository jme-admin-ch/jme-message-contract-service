management:
  server:
    port: 8082
    base-path: /message-contract-service
spring:
  datasource:
    #   Note for RHOS: Database connection info is passed from nop/api vault
    #   /vault/secrets/database-credentials.yml is generated with this information from agent injector
    #   See following lines in Deployment https://bitbucket.bit.admin.ch/projects/JEAPRHOS/repos/jeap-application-helmchart/browse/src/templates/deployment.yaml#17-37
    #    type: com.zaxxer.hikari.HikariDataSource
    #    driver-class-name: org.postgresql.Driver
    #    url: jdbc:postgresql://${POSTGRESQL_HOST}:5432/${POSTGRESQL_DATABASE}
    #    username: "${POSTGRESQL_USER}"
    #    password: "${POSTGRESQL_PASSWORD}"
    hikari:
      schema: data
  jpa:
    database: postgresql
    show-sql: false
    generate-ddl: false
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: data
        # https://stackoverflow.com/questions/10075081/hibernate-slow-to-acquire-postgres-connection
        use_jdbc_metadata_defaults: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

database-migration:
  init-container: ${IS_INIT_CONTAINER_EXECUTION}


jeap:
  monitor:
    prometheus:
      secure: false
  logging:
    platform: rhos
  swagger:
    status: OPEN
  web:
    tls:
      enabled: false
