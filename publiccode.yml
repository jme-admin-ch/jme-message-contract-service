description:
  en:
    localisedName: jme-message-contract-service
    shortDescription: Backend service for managing JME message contracts and deployment compatibility checks.
    longDescription: >
      jme-message-contract-service is the JME instance of the jEAP Message Contract Service. It provides a
      Spring Boot backend API for registering producer and consumer message contracts for application versions,
      storing them in PostgreSQL, recording deployments, and checking whether deployed applications are compatible
      before or during rollout.
    features:
      - Register producer and consumer message contracts per application version
      - Persist contract and deployment metadata in PostgreSQL
      - Check compatibility between deployed producers and consumers
      - Expose REST and Swagger/OpenAPI endpoints for integration and operations
